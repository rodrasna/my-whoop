name: OpenWhoop
options:
  bundleIdPrefix: com.rodrigocalvo
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
packages:
  WhoopProtocol:
    path: ../Packages/WhoopProtocol
  WhoopStore:
    path: ../Packages/WhoopStore
targets:
  OpenWhoop:
    type: application
    platform: iOS
    sources: [OpenWhoop]
    resources:
      - OpenWhoop/Mobility/ExerciseImages
    configFiles:
      Debug: OpenWhoop/Config/Secrets.xcconfig
      Release: OpenWhoop/Config/Secrets.xcconfig
    info:
      path: OpenWhoop/Info.plist
      properties:
        CFBundleDisplayName: OpenWhoop
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSBluetoothAlwaysUsageDescription: >-
          OpenWhoop connects to your WHOOP 4.0 over Bluetooth to read heart rate,
          R-R intervals, battery, and sensor data locally on your device.
        NSMicrophoneUsageDescription: >-
          OpenWhoop uses the microphone to record your morning sleep check-in so we
          can transcribe how you feel when you wake up.
        NSSpeechRecognitionUsageDescription: >-
          OpenWhoop transcribes your voice check-in on device to understand how you
          slept and how you feel in the morning.
        UIBackgroundModes:
          - bluetooth-central
        WHOOP_BASE_URL: $(WHOOP_BASE_URL)
        WHOOP_API_KEY: $(WHOOP_API_KEY)
        WHOOP_DEVICE_ID: $(WHOOP_DEVICE_ID)
    dependencies:
      - package: WhoopProtocol
      - package: WhoopStore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rodrigocalvo.mywhoop
        TARGETED_DEVICE_FAMILY: 1
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "8"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
  OpenWhoopTests:
    type: bundle.unit-test
    platform: iOS
    sources: [OpenWhoopTests]
    resources:
      - OpenWhoopTests/Fixtures
    dependencies:
      - target: OpenWhoop
      - package: WhoopProtocol
      - package: WhoopStore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
